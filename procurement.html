<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphyte Logic - Procurement Room</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #141414; color: #e0e0e0; padding: 30px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        .nav-back { display: inline-block; margin-bottom: 20px; color: #10b981; text-decoration: none; font-weight: bold; font-size: 0.95rem; transition: color 0.2s; }
        .nav-back:hover { color: #66ffff; }
        .header { border-bottom: 2px solid #003333; padding-bottom: 20px; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .header h1 { margin: 0; font-size: 2.2rem; color: #10b981; }
        .list-container { display: flex; flex-direction: column; gap: 25px; }
        .card { background: #1e1e1e; border-radius: 6px; border: 1px solid #2d2d2d; padding: 25px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        .card.alert-border { border-left: 5px solid #ff4444; border-right: 1px solid #ff4444; border-top: 1px solid #ff4444; border-bottom: 1px solid #ff4444; background: #241818; }
        .alert-banner { background: #ff4444; color: #141414; padding: 8px 12px; border-radius: 4px; font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; }
        .card-header h3 { margin: 0; font-size: 1.35rem; color: #ffffff; line-height: 1.4; }
        .badges { display: flex; gap: 8px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .badge.class { background: #003333; color: #00ffff; }
        .badge.impact-high { background: #ff4444; color: #141414; }
        .badge.impact-medium { background: #ffaa00; color: #141414; }
        .badge.impact-low { background: #00aa55; color: #ffffff; }
        .analysis-block { background: #252525; padding: 12px 15px; border-radius: 4px; font-size: 0.95rem; border-left: 3px solid #10b981; }
        .analysis-block.action { border-left-color: #ffaa00; background: #28241c; }
        .analysis-block strong { color: #ffffff; display: block; margin-bottom: 4px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .meta-info { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #2d2d2d; padding-top: 15px; font-size: 0.85rem; color: #777777; }
        .btn { background: #252525; color: #10b981; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 0.85rem; border: 1px solid #10b981; transition: all 0.2s; }
        .btn:hover { background: #10b981; color: #141414; }
        .btn-refresh { background: transparent; border: 2px solid #10b981; color: #10b981; padding: 10px 20px; font-size: 1rem; font-weight: bold; border-radius: 5px; cursor: pointer; transition: all 0.2s; }
        .btn-refresh:hover { background: #10b981; color: #141414; }
        #refresh-status { font-size: 0.95rem; color: #888; font-weight: normal; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-back">← Torna all'Hub Centrale</a>
        <div class="header">
            <div>
                <h1>🏛️ Procurement & Compliance Room</h1>
                <div id="refresh-status">Monitoraggio direttive EBA, DORA e gestione Terze Parti</div>
                <div id="last-update" style="font-size: 0.85rem; color: #a0aec0; margin-top: 4px;"></div>
            </div>
            <button id="btn-refresh" class="btn-refresh" onclick="forzaAggiornamento()">Aggiorna Ora</button>
        </div>
        <div id="news-container" class="list-container">Caricamento report analitici...</div>
    </div>

    <script>
        // 🛡️ SANITIZZAZIONE XSS
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, match => {
                return {'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[match];
            });
        }

        async function refreshData(category) {
            const btn = document.querySelector('.btn');
            const statusText = document.getElementById('update-status');
            btn.disabled = true;
            statusText.innerHTML = "⏳ Avvio aggiornamento asincrono...";

            try {
                const res = await fetch(`http://localhost:8000/api/refresh/${category}`, { method: 'POST' });
                const data = await res.json();

                if (data.status === "started" || data.status === "ignored") {
                    const pollInterval = setInterval(async () => {
                        try {
                            const statusRes = await fetch(`http://localhost:8000/api/status/${category}`);
                            const statusData = await statusRes.json();
                            
                            if (statusData.running) {
                                statusText.innerHTML = `⏳ ${escapeHTML(statusData.message)}`;
                            } else {
                                clearInterval(pollInterval);
                                statusText.innerHTML = `✅ ${escapeHTML(statusData.message)}`;
                                fetchProcurementNews(); 
                                btn.disabled = false;
                            }
                        } catch (err) {
                            clearInterval(pollInterval);
                            statusText.innerHTML = "❌ Errore di connessione durante il monitoraggio.";
                            btn.disabled = false;
                        }
                    }, 2000);
                } else {
                    statusText.innerHTML = `❌ Errore: ${escapeHTML(data.message)}`;
                    btn.disabled = false;
                }
            } catch (error) {
                statusText.innerHTML = "❌ Errore di connessione al server.";
                btn.disabled = false;
            }
        }

        async function fetchProcurementNews() {
            try {
                const res = await fetch('procurement_news.json?v=' + Date.now());
                const data = await res.json();
                
                if (!data || data.length === 0) {
                    document.getElementById('news-container').innerHTML = "<p>Nessun dato disponibile nel database JSON.</p>";
                    return;
                }

                document.getElementById('news-container').innerHTML = data.map(n => `
                    <div class="card">
                        <div class="card-header">
                            <h3>${escapeHTML(n.title)}</h3>
                            <div class="badges">
                                <span class="badge class">${escapeHTML(n.classification || 'RISK')}</span>
                                <span class="badge impact-${escapeHTML(n.impact || 'MEDIUM').toLowerCase()}">Impatto: ${escapeHTML(n.impact)}</span>
                            </div>
                        </div>
                        <p style="color: #cbd5e1; margin: 0; line-height: 1.6;">${escapeHTML(n.summary)}</p>
                        <div class="analysis-block">
                            <strong>Why It Matters (Rilevanza per l'ecosistema aziendale):</strong>
                            ${escapeHTML(n.why_it_matters)}
                        </div>
                        <div class="analysis-block action">
                            <strong>Azione Suggerita al C-Level / Procurement Leader:</strong>
                            ${escapeHTML(n.action_item)}
                        </div>
                        <div class="meta-info">
                            <span>Fonte: 📂 ${escapeHTML(n.source)}</span>
                            <a href="${escapeHTML(n.url)}" target="_blank" class="btn">Apri Documento →</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Errore Json:", e);
                document.getElementById('news-container').innerHTML = "<p style='color: #ff4444;'>Impossibile caricare il database analitico.</p>";
            }
        }
        
        fetchProcurementNews();
    </script>
</body>
</html>
