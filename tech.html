<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphyte Logic - AI Newsroom</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #141414; 
            color: #e0e0e0; 
            padding: 30px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .nav-back {
            display: inline-block;
            margin-bottom: 20px;
            color: #00ffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .nav-back:hover {
            color: #66ffff;
        }
        .header {
            border-bottom: 2px solid #003333;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header h1 { 
            margin: 0; 
            font-size: 2.2rem;
            color: #00ffff;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 25px; 
            border-left: 5px solid #00ffff; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card h3 {
            margin-top: 0;
            color: #ffffff;
            font-size: 1.25rem;
            line-height: 1.4;
        }
        .card p {
            color: #aaaaaa;
            font-size: 0.95rem;
            line-height: 1.6;
            flex-grow: 1;
        }
        .meta-info {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #2d2d2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #777777;
        }
        .btn { 
            color: #00ffff; 
            text-decoration: none; 
            font-weight: bold; 
        }
        .btn:hover {
            text-decoration: underline;
        }
        .control-panel {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #003333;
        }
        .btn-refresh {
            background: #00ffff;
            color: #111;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .btn-refresh:hover {
            background: #66ffff;
        }
        .btn-refresh:disabled {
            background: #555;
            color: #aaa;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="nav-back">← Torna all'Hub Principale</a>
        
        <div class="header">
            <img src="https://github.com/graphyte-logic.png" width="60" style="border-radius: 50%;" alt="Logo">
            <div>
                <h1>Graphyte AI Newsroom</h1>
                <p style="margin: 5px 0 0 0; color: #888;">Monitoraggio autonomo sui trend globali di intelligenza artificiale e sviluppo</p>
            </div>
        </div>

        <div class="control-panel">
            <div>
                <span style="font-weight: bold; color: #00ffff;">⚙️ Gestione Hub</span>
                <div id="refresh-status" style="color: #aaa; font-size: 0.85rem; margin-top: 3px;">Usa il comando a destra per forzare la generazione e il push su GitHub Pages.</div>
            </div>
            <button id="btn-refresh" class="btn-refresh" onclick="forzaAggiornamento()">🔄 Aggiorna Ora</button>
        </div>

        <div id="news-container" class="grid">Caricamento notizie...</div>
    </div>

    <script>
        // FUNZIONE DI FORZATURA BACKEND MANCANTE AGGIUNTA
        async function forzaAggiornamento() {
            const statusText = document.getElementById('refresh-status');
            const btn = document.getElementById('btn-refresh');
            statusText.innerHTML = "⏳ Analisi feed e sintesi IA in corso... Attendi circa 15 secondi...";
            btn.disabled = true;
            try {
                const response = await fetch('http://127.0.0.1:8000/api/refresh/tech', { method: 'POST' });
                const data = await response.json();
                if (data.status === 'success') {
                    statusText.innerHTML = "<span style='color: #00ff00;'>✅ Sincronizzazione locale e remota completata!</span>";
                    setTimeout(() => { fetchNews(); }, 1000);
                } else {
                    statusText.innerHTML = "<span style='color: #ff4444;'>❌ Errore nell'elaborazione del backend.</span>";
                }
            } catch (error) {
                statusText.innerHTML = "<span style='color: #ff4444;'>❌ Errore: Assicurati che il file main.py sia avviato.</span>";
            }
            btn.disabled = false;
        }

        async function fetchNews() {
            try {
                // CORRETTO: adesso punta a news.json e non a legal_news.json
                const res = await fetch('news.json?v=' + Date.now());
                const data = await res.json();
                const container = document.getElementById('news-container');
                
                if (!data || data.length === 0) {
                    container.innerHTML = "<p>Nessun aggiornamento disponibile al momento.</p>";
                    return;
                }

                container.innerHTML = data.map(n => `
                    <div class="card">
                        <div>
                            <h3>${n.title}</h3>
                            <p>${n.summary}</p>
                        </div>
                        <div class="meta-info">
                            <span>📰 ${n.source || 'HackerNews'}</span>
                            <a href="${n.url}" target="_blank" class="btn">Leggi di più →</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) { 
                console.error("Errore nel caricamento news:", e); 
                document.getElementById('news-container').innerHTML = "<p style='color: #ff4444;'>Nessun dato tech rilevato nell'archivio remoto.</p>";
            }
        }
        fetchNews();
    </script>
</body>
</html>
