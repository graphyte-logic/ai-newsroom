<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphyte Logic - Tech & AI Room</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0c0f0e; color: #e2e8f0; padding: 30px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        .nav-back { display: inline-block; margin-bottom: 20px; color: #00ffff; text-decoration: none; font-weight: bold; font-size: 0.95rem; }
        .header { border-bottom: 1px solid #1e2925; padding-bottom: 20px; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { margin: 0; font-size: 2rem; color: #f8fafc; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .card { 
            background: #141917; 
            border-radius: 8px; 
            border-top: 1px solid #2d2d2d;
            border-right: 2px solid #00ffff;
            border-bottom: 2px solid #00ffff;
            border-left: 2px solid #00ffff;
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }
        .card h3 { margin: 0 0 10px 0; font-size: 1.15rem; color: #ffffff; line-height: 1.4; }
        .card p { margin: 0 0 15px 0; font-size: 0.95rem; color: #94a3b8; line-height: 1.5; flex-grow: 1; }
        
        .meta-info { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1e2925; padding-top: 12px; font-size: 0.85rem; color: #64748b; }
        .read-more { color: #00ffff; text-decoration: none; font-weight: bold; }
        .read-more:hover { color: #ffffff; }

        .btn-refresh { background: #1e1e1e; border: 1px solid #00ffff; color: #00ffff; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: all 0.2s; font-weight: bold; }
        .btn-refresh:hover { background: #00ffff; color: #141414; }
        #refresh-status { font-size: 0.95rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-back">← Torna all'Hub</a>
        <div class="header">
            <div>
                <h1>🌐 Tech & AI Intelligence</h1>
                <div id="refresh-status">Sorgenti monitorate in tempo reale</div>
                <div id="last-update" style="font-size: 0.85rem; color: #a0aec0; margin-top: 4px;"></div>
            </div>
            <button id="btn-refresh" class="btn-refresh" onclick="refreshData('tech')">Aggiorna Ora</button>
        </div>
        <div id="news-container" class="grid">Caricamento notizie...</div>
    </div>
    <script>
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, match => {
                return {'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[match];
            });
        }

        async function refreshData(category) {
            const btn = document.getElementById('btn-refresh');
            const statusText = document.getElementById('refresh-status');
            btn.disabled = true;
            statusText.innerText = "⏳ Avvio aggiornamento asincrono...";

            try {
                const res = await fetch(`http://localhost:8000/api/refresh/${category}`, { method: 'POST' });
                const data = await res.json();

                if (data.status === "started" || data.status === "ignored") {
                    const pollInterval = setInterval(async () => {
                        try {
                            const statusRes = await fetch(`http://localhost:8000/api/status/${category}`);
                            const statusData = await statusRes.json();
                            
                            if (statusData.running) {
                                statusText.innerText = `⏳ ${statusData.message}`;
                            } else {
                                clearInterval(pollInterval);
                                statusText.innerText = `✅ ${statusData.message}`;
                                fetchNews();
                                btn.disabled = false;
                            }
                        } catch (err) {
                            clearInterval(pollInterval);
                            statusText.innerText = "❌ Errore di connessione durante il monitoraggio.";
                            btn.disabled = false;
                        }
                    }, 2000);
                } else {
                    statusText.innerText = `❌ Errore: ${data.message}`;
                    btn.disabled = false;
                }
            } catch (error) {
                statusText.innerText = "❌ Errore di connessione al server.";
                btn.disabled = false;
            }
        }

        async function fetchNews() {
            try {
                // Forziamo il file specifico per evitare letture incrociate
                const res = await fetch(`tech_news.json?v=${Date.now()}`);
                const data = await res.json();
                const container = document.getElementById('news-container');
                const updateText = document.getElementById('last-update');

                if (!data || data.length === 0) {
                    container.innerHTML = "<p>Nessun dato disponibile.</p>";
                    return;
                }
                
                const adesso = new Date();
                const dataFormattata = adesso.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const oraFormattata = adesso.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                
                // Usiamo innerHTML solo qui perché i dati temporali sono sicuri e generati dal browser
                updateText.innerHTML = `📅 Ultimo aggiornamento: <strong>${dataFormattata}</strong> alle <strong>${oraFormattata}</strong>`;
                
                container.innerHTML = data.map(n => `
                    <div class="card">
                        <div>
                            <h3>${escapeHTML(n.title)}</h3>
                            <p>${escapeHTML(n.summary)}</p>
                        </div>
                        <div class="meta-info">
                            <span>🌐 ${escapeHTML(n.source || 'Tech Source')}</span>
                            <a href="${escapeHTML(n.url)}" target="_blank" class="read-more">Leggi di più →</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) { 
                console.error("Errore nel caricamento del file JSON:", e);
                document.getElementById('news-container').innerHTML = "<p style='color: #ff4444;'>Impossibile caricare i dati.</p>";
            }
        }
        
        fetchNews();
    </script>
</body>
</html>
