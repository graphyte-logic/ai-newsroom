<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphyte Logic - Tech & AI Room</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0c0f0e; color: #e2e8f0; padding: 30px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        .nav-back { display: inline-block; margin-bottom: 20px; color: #00ffff; text-decoration: none; font-weight: bold; font-size: 0.95rem; }
        .header { border-bottom: 1px solid #1e2925; padding-bottom: 20px; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { margin: 0; font-size: 2rem; color: #f8fafc; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .card { 
            background: #141917; 
            border-radius: 8px; 
            border-top: 1px solid #2d2d2d;
            border-right: 2px solid #00ffff;
            border-bottom: 2px solid #00ffff;
            border-left: 2px solid #00ffff;
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }
        .card h3 { margin: 0 0 10px 0; font-size: 1.15rem; color: #ffffff; line-height: 1.4; }
        .card p { margin: 0 0 15px 0; font-size: 0.95rem; color: #94a3b8; line-height: 1.5; flex-grow: 1; }
        
        .meta-info { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1e2925; padding-top: 12px; font-size: 0.85rem; color: #64748b; }
        .read-more { color: #00ffff; text-decoration: none; font-weight: bold; }
        .read-more:hover { color: #ffffff; }

        .btn-refresh { background: #1e1e1e; border: 1px solid #00ffff; color: #00ffff; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: all 0.2s; font-weight: bold; }
        .btn-refresh:hover { background: #00ffff; color: #141414; }
        #refresh-status { font-size: 0.95rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-back">← Torna all'Hub</a>
        <div class="header">
            <div>
                <h1>🌐 Tech & AI Intelligence</h1>
                <div id="refresh-status">Sorgenti monitorate in tempo reale</div>
                <div id="last-update" style="font-size: 0.85rem; color: #a0aec0; margin-top: 4px;"></div>
            </div>
            <button id="btn-refresh" class="btn-refresh" onclick="forzaAggiornamento()">Aggiorna Ora</button>
        </div>
        <div id="news-container" class="grid">Caricamento notizie...</div>
    </div>
    <script>
        async function forzaAggiornamento() {
            const statusText = document.getElementById('refresh-status');
            const btn = document.getElementById('btn-refresh');
            
            statusText.innerHTML = "⏳ Analisi delle fonti e generazione riassunti AI in corso...";
            btn.disabled = true;
            
            try {
                const response = await fetch('https://graphyte-newsroom.onrender.com/api/refresh/tech', { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'success') {
                    let countdown = 30;
                    const interval = setInterval(() => {
                        countdown--;
                        if (countdown <= 0) {
                            clearInterval(interval);
                            statusText.innerHTML = "<span style='color: #00ffff; font-weight: bold;'>✨ Osservatorio Tech aggiornato con successo!</span>";
                            fetchNews(); 
                            btn.disabled = false;
                        } else {
                            statusText.innerHTML = `🤖 Claude sta analizzando le innovazioni tecnologiche... Mancano ${countdown}s`;
                        }
                    }, 1000);
                } else { 
                    statusText.innerHTML = "<span style='color: #ff4444;'>❌ Errore nella risposta del server di backend.</span>"; 
                    btn.disabled = false; 
                }
            } catch (error) { 
                statusText.innerHTML = "<span style='color: #ff4444;'>❌ Backend offline. Uso della cache locale in corso.</span>"; 
                btn.disabled = false; 
                fetchNews();
            }
        }

        async function fetchNews() {
            const container = document.getElementById('news-container');
            const updateText = document.getElementById('last-update');
            try {
                const res = await fetch('tech_news.json?v=' + Date.now());
                
                // Se il file dà errore 404 o non viene trovato, andiamo direttamente nel blocco catch
                if (!res.ok) {
                    throw new Error("File JSON non trovato o non accessibile");
                }
                
                const data = await res.json();
                
                if (!data || data.length === 0) { 
                    container.innerHTML = "<p style='color: #a0aec0;'>Nessun dato disponibile nel feed Tech. Clicca 'Aggiorna Ora' per popolarlo.</p>"; 
                    return; 
                }
                
                const adesso = new Date();
                const dataFormattata = adesso.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const oraFormattata = adesso.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                updateText.innerHTML = `📅 Ultimo aggiornamento: <strong>${dataFormattata}</strong> alle <strong>${oraFormattata}</strong>`;
                
                container.innerHTML = data.map(n => `
                    <div class="card">
                        <div>
                            <h3>${n.title}</h3>
                            <p>${n.summary}</p>
                        </div>
                        <div class="meta-info">
                            <span>🌐 ${n.source || 'Tech Source'}</span>
                            <a href="${n.url}" target="_blank" class="read-more">Leggi di più →</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) { 
                console.error("Errore riscontrato:", e);
                // Fallback visivo per l'utente per non lasciare la pagina vuota se il JSON manca
                container.innerHTML = `
                    <div class="card" style="grid-column: 1 / -1; border-color: #ffaa00; text-align: center;">
                        <h3>⚠️ Database locale in fase di inizializzazione</h3>
                        <p>Il file <code>tech_news.json</code> non è ancora stato generato o è vuoto. Premi il pulsante <strong>"Aggiorna Ora"</strong> in alto a destra per attivare l'agente AI e creare la prima rassegna stampa tecnologica.</p>
                    </div>
                `;
            }
        }
        fetchNews();
    </script>
</body>
</html>
