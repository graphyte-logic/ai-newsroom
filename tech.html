<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Graphyte Logic - AI Newsroom</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #2a2a2a; padding: 20px; border-left: 5px solid #00ffff; border-radius: 8px; }
        .btn { display: inline-block; margin-top: 10px; color: #00ffff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <img src="https://github.com/graphyte-logic.png" width="100" alt="Logo">
    <h1>Graphyte AI Newsroom</h1>
    <div id="news-container" class="grid">Caricamento notizie...</div>

    <script>
        async function fetchNews() {
            try {
                const res = await fetch('news.json');
                const data = await res.json();
                const container = document.getElementById('news-container');
                container.innerHTML = data.map(n => `
                    <div class="card">
                        <h3>${n.title}</h3>
                        <p>${n.summary.substring(0, 150)}...</p>
                        <a href="${n.url}" target="_blank" class="btn">Leggi di più →</a>
                    </div>
                `).join('');
            } catch (e) { console.error("Errore nel caricamento news:", e); }
        }
        fetchNews();
    </script>
</body>
</html>
